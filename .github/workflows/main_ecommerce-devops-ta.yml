name: Build and deploy Node.js app to Azure Web App - ecommerce-devops-ta

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # ✅ FIX BURDADIR
      - name: Install, build, test (backend)
        working-directory: ecommerce-app-backend
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present || true

      # ✅ artifact yalnız backend
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ecommerce-app-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ✅ deploy düzgün folder
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecommerce-devops-ta'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_12E5D8EF49614F4C8764D9394A42AE26 }}